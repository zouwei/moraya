name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      # v0.60.0-pre §1.3.3: enforce npm-only consumption boundary for
      # @moraya/core. The sibling repo at ../moraya-core (or
      # ./moraya-core symlink) is for cross-repo editing convenience
      # only; production code MUST import via the published package name.
      #
      # Vendored tarballs under ./vendor/*.tgz (frozen artifacts produced by
      # `pnpm pack` in the sibling repo) are acceptable as a pre-publication
      # bridge per §1.3 "Local iteration without a publish round-trip".
      - name: Forbid sibling-path imports of @moraya/core
        run: |
          set -e
          if grep -rEn "from[[:space:]]+['\"](\.{1,2}/)+moraya-core" src src-tauri 2>/dev/null; then
            echo "::error::Found relative-path import of moraya-core. Use the published package: import from '@moraya/core'."
            exit 1
          fi
          if grep -nE "['\"](\.{1,2}/)+moraya-core" tsconfig.json 2>/dev/null; then
            echo "::error::tsconfig.json must not map @moraya/core to a sibling path."
            exit 1
          fi
          if [ -f pnpm-workspace.yaml ] && grep -nE "moraya-core" pnpm-workspace.yaml; then
            echo "::error::pnpm-workspace.yaml must not reference moraya-core."
            exit 1
          fi
          if grep -nE "\"@moraya/core\":[[:space:]]*\"(file:\.\.?/|link:|workspace:)" package.json; then
            echo "::error::package.json must depend on @moraya/core via the registry or a frozen tarball under ./vendor/, not file:./.. paths or link:/workspace:."
            exit 1
          fi
          echo "OK: no sibling-path imports of @moraya/core."

  build:
    runs-on: ubuntu-22.04
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm tauri build

      # Keep optional diagnostics helpers compilable and tested so they do not
      # rot between releases.
      - name: Check diagnostics feature
        working-directory: src-tauri
        run: cargo check --features diagnostics

      - name: Test diagnostics feature
        working-directory: src-tauri
        run: cargo test --features diagnostics
