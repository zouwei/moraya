  # Rename release assets to include OS label (mac/win/linux)
  rename-assets:
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Rename assets with OS label
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" --jq '.id')

          gh api "repos/${{ github.repository }}/releases/${RELEASE_ID}/assets" \
            --paginate --jq '.[] | "\(.id)\t\(.name)"' | \
          while IFS=$'\t' read -r ASSET_ID ASSET_NAME; do
            # Skip if already renamed (re-run safe)
            if echo "$ASSET_NAME" | grep -qEi '(moraya_[0-9.]+_(mac|win|linux)_|moraya-[0-9.]+-linux\.)'; then
              continue
            fi

            NEW_NAME=""
            case "$ASSET_NAME" in
              # macOS
              *.dmg|*.dmg.tar.gz|*.dmg.tar.gz.sig)
                NEW_NAME=$(echo "$ASSET_NAME" | sed -E "s/^([Mm]oraya_[0-9.]+)_/\1_mac_/") ;;
              # Windows
              *.msi|*.msi.zip|*.msi.zip.sig|*-setup.exe|*.nsis.zip|*.nsis.zip.sig)
                NEW_NAME=$(echo "$ASSET_NAME" | sed -E "s/^([Mm]oraya_[0-9.]+)_/\1_win_/") ;;
              # Linux: deb / AppImage (underscore-separated)
              *.deb|*.deb.sig|*.AppImage|*.AppImage.sig|*.AppImage.tar.gz|*.AppImage.tar.gz.sig)
                NEW_NAME=$(echo "$ASSET_NAME" | sed -E "s/^([Mm]oraya_[0-9.]+)_/\1_linux_/") ;;
              # Linux: RPM (dash-separated, e.g. Moraya-0.22.0-1.x86_64.rpm)
              *.rpm|*.rpm.sig)
                NEW_NAME=$(echo "$ASSET_NAME" | sed -E "s/^([Mm]oraya-[0-9.]+)-[0-9]+\./\1-linux./") ;;
            esac

            if [ -n "$NEW_NAME" ] && [ "$NEW_NAME" != "$ASSET_NAME" ]; then
              echo "Renaming: $ASSET_NAME -> $NEW_NAME"
              gh api --method PATCH \
                "repos/${{ github.repository }}/releases/assets/${ASSET_ID}" \
                -f name="${NEW_NAME}" 2>/dev/null || echo "  Skipped (target name already exists)"
            fi
          done

  # Update Homebrew Cask after release assets are renamed
  update-homebrew:
    needs: [rename-assets]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh workflow run bump-cask.yml \
            -R zouwei/homebrew-moraya \
            -f version="$VERSION" \
            -f tag="${GITHUB_REF_NAME}"

  # Wait for all builds before triggering deploy
  trigger-deploy:
    needs: [rename-assets, update-homebrew]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages Deploy
        run: |
          curl -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}"

      - name: Notify success
        run: |
          echo "✅ Cloudflare Pages deploy triggered for ${{ github.ref_name }}"
