name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS (aarch64 + x86_64)
          - platform: macos-latest
            args: '--target aarch64-apple-darwin --bundles dmg'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin --bundles dmg'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          # Windows (x64 + arm64)
          - platform: windows-latest
            args: ''
            rust-targets: ''
          # Linux x86_64
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          # Linux aarch64 (deb + rpm only, skip AppImage)
          - platform: ubuntu-24.04-arm
            args: '--bundles deb,rpm'
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf \
            libayatana-appindicator3-dev xdg-utils

      - name: Install WiX Toolset
        if: matrix.platform == 'windows-latest'
        run: |
          $wixDir = "$env:LOCALAPPDATA\tauri\WixTools314"
          if (Test-Path "$wixDir\candle.exe") {
            Write-Host "WiX already cached at $wixDir"
          } else {
            New-Item -ItemType Directory -Force -Path $wixDir | Out-Null
            $url = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
            $zip = "$env:TEMP\wix314.zip"
            $maxRetries = 3
            for ($i = 1; $i -le $maxRetries; $i++) {
              try {
                Write-Host "Downloading WiX (attempt $i/$maxRetries)..."
                Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
                break
              } catch {
                if ($i -eq $maxRetries) { throw }
                Start-Sleep -Seconds 5
              }
            }
            Expand-Archive -Path $zip -DestinationPath $wixDir -Force
            Remove-Item $zip
            Write-Host "WiX installed to $wixDir"
          }
        shell: pwsh

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # To enable Apple Developer signing + notarization, add these GitHub Secrets:
      #   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
      #   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
      # Then uncomment the env lines in the step below.
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Moraya ${{ github.ref_name }}'
          releaseBody: |
            See the assets below to download and install.

            ### macOS

            **Homebrew (recommended)**:
            ```
            brew tap zouwei/moraya
            brew install --cask moraya
            ```

            **Manual**: Download the `.dmg` file below.
            > If you see **"Moraya is damaged"**, open Terminal and run:
            > ```
            > xattr -cr /Applications/Moraya.app
            > ```
            > Or download the `fix-macos-gatekeeper.command` script below, double-click to run it.

            ### Linux

            - **.deb** — `sudo dpkg -i moraya_*.deb`
            - **.AppImage** — `chmod +x Moraya_*.AppImage && ./Moraya_*.AppImage`

            ### Windows

            Run the `.msi` installer.

          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Generate macOS fix script as release asset
      - name: Create macOS Gatekeeper fix script
        if: matrix.platform == 'macos-latest' && contains(matrix.args, 'aarch64')
        run: |
          cat > fix-macos-gatekeeper.command << 'SCRIPT'
          #!/bin/bash
          # Moraya — Fix macOS Gatekeeper "damaged app" error
          # Double-click this file or run in Terminal.

          echo "Fixing Moraya Gatekeeper issue..."
          if [ -d "/Applications/Moraya.app" ]; then
            xattr -cr /Applications/Moraya.app
            echo "✅ Fixed! Opening Moraya..."
            open /Applications/Moraya.app
          else
            echo "❌ Moraya.app not found in /Applications."
            echo "   Please drag Moraya.app to /Applications first."
          fi
          SCRIPT
          chmod +x fix-macos-gatekeeper.command

      - name: Upload macOS fix script
        if: matrix.platform == 'macos-latest' && contains(matrix.args, 'aarch64')
        uses: softprops/action-gh-release@v2
        with:
          files: fix-macos-gatekeeper.command
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


